version: "3.9"

services:
  backend:
    build: .
    container_name: fasthousing-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - fasthousing-net

  postgres:
    image: postgres:15
    container_name: fasthousing-postgres
    environment:
      POSTGRES_USER: fasthousing
      POSTGRES_PASSWORD: fasthousing
      POSTGRES_DB: fasthousing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fasthousing-net

  redis:
    image: redis:7
    container_name: fasthousing-redis
    ports:
      - "6379:6379"
    networks:
      - fasthousing-net

networks:
  fasthousing-net:
    driver: bridge

volumes:
  pgdata:
